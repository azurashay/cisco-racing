<!DOCTYPE html>
<html lang="he" dir="ltr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cisco Hybrid Mesh Firewall</title>
    <link rel="stylesheet" href="theme/cisco_theme.css" />
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      html, body { font-family: var(--fz-font-family-1, 'Cisco Sans', sans-serif) !important; }
      body {
        position: relative;
        overflow-x: hidden;
        transition: background 0.4s ease, color 0.4s ease;
      }
      .cisco-btn-primary {
        font-family: var(--fz-btn-global-font-family);
        font-size: var(--fz-btn-global-font-size);
        font-weight: var(--fz-btn-global-weight);
        line-height: var(--fz-btn-global-line-height);
        letter-spacing: var(--fz-btn-global-letter-spacing);
        padding: var(--fz-btn-primary-padding);
        border-radius: var(--fz-btn-primary-border-radius);
        transition: all 0.3s ease;
        cursor: pointer;
        outline: none;
        margin: 1rem 0;
      }
      .section-bg-cisco {
        background-color: transparent !important;
        background-image: none;
        position: relative;
        z-index: 3;
      }
      .section-content-cisco {
        position: relative;
        z-index: 5;
      }
      @keyframes bounce {
        0%, 100% { transform: translateY(0); }
        50% { transform: translateY(-10px); }
      }
      .phase-label {
        display: inline-block;
        padding: 0.3rem 0.9rem;
        border-radius: 999px;
        font-weight: var(--fz-weight-semi-bold);
        font-size: 0.65rem;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        margin-bottom: 1rem;
        border: 1.5px solid;
        background: transparent;
        transition: all 0.3s ease;
        width: fit-content;
      }
      .phase-label.discover {
        color: var(--fz-color-primary-4);
        border-color: rgba(0, 188, 235, 0.4);
      }
      .phase-label.protect {
        color: var(--fz-color-warning-3);
        border-color: rgba(245, 158, 11, 0.4);
      }
      .phase-label.monitor {
        color: var(--fz-color-success-3);
        border-color: rgba(34, 197, 94, 0.4);
      }
      .dot-nav-item { transition: all 0.3s ease; }
      .dot-nav-item:hover { transform: scale(1.3); }

      /* Theme toggle */
      .theme-toggle {
        position: fixed;
        top: 16px;
        right: 20px;
        z-index: 9999;
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 6px 10px 6px 6px;
        border-radius: 999px;
        cursor: pointer;
        border: 1px solid;
        transition: all 0.35s ease;
        backdrop-filter: blur(12px);
        user-select: none;
      }
      .toggle-track {
        width: 36px;
        height: 20px;
        border-radius: 999px;
        position: relative;
        transition: background 0.35s ease;
        flex-shrink: 0;
      }
      .toggle-thumb {
        position: absolute;
        top: 3px;
        width: 14px;
        height: 14px;
        border-radius: 50%;
        background: #fff;
        transition: transform 0.35s ease, background 0.35s ease;
        box-shadow: 0 1px 4px rgba(0,0,0,0.3);
      }
      .toggle-label {
        font-size: 0.7rem;
        font-weight: 600;
        letter-spacing: 0.06em;
        text-transform: uppercase;
        transition: color 0.35s ease;
      }
      @keyframes heroFeedRise {
        from {
          transform: translateY(0);
        }
        to {
          transform: translateY(-50%);
        }
      }
      @keyframes accentPulse {
        0%, 100% {
          opacity: 0.45;
          transform: scale(0.94);
        }
        50% {
          opacity: 0.85;
          transform: scale(1.08);
        }
      }
      .hero-frame {
        position: absolute;
        inset: 0;
        overflow: hidden;
      }
      .hero-video {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        object-fit: cover;
        filter: blur(3px) saturate(0.72) brightness(0.4);
        transform: scale(1.06);
      }
      .hero-overlay {
        position: absolute;
        inset: 0;
        background:
          radial-gradient(circle at 50% 42%, rgba(0, 188, 235, 0.08), transparent 28%),
          radial-gradient(circle at 20% 20%, rgba(0, 188, 235, 0.05), transparent 30%),
          radial-gradient(circle at 80% 24%, rgba(0, 112, 210, 0.04), transparent 30%),
          linear-gradient(180deg, rgba(13, 13, 13, 0.3) 0%, rgba(13, 13, 13, 0.75) 55%, rgba(13, 13, 13, 0.95) 100%);
      }
      .hero-overlay-light {
        background:
          radial-gradient(circle at 50% 42%, rgba(220, 235, 250, 0.3), transparent 28%),
          radial-gradient(circle at 20% 20%, rgba(200, 230, 255, 0.2), transparent 30%),
          radial-gradient(circle at 80% 24%, rgba(200, 225, 250, 0.15), transparent 30%),
          linear-gradient(180deg, rgba(244, 245, 248, 0.75) 0%, rgba(244, 245, 248, 0.88) 55%, rgba(244, 245, 248, 0.95) 100%) !important;
      }
      .hero-overlay::before,
      .hero-overlay::after {
        content: '';
        position: absolute;
        top: 0;
        width: 92px;
        height: 140px;
        opacity: 0.5;
        background:
          repeating-linear-gradient(
            90deg,
            rgba(255, 255, 255, 0.08) 0,
            rgba(255, 255, 255, 0.08) 10px,
            transparent 10px,
            transparent 22px
          );
        clip-path: polygon(0 0, 100% 0, 100% 78%, 70% 100%, 40% 72%, 0 100%);
      }
      .hero-overlay::before { left: 0; }
      .hero-overlay::after {
        right: 0;
        transform: scaleX(-1);
      }
      .hero-feed-column {
        position: absolute;
        top: 9vh;
        bottom: 9vh;
        width: min(26vw, 320px);
        overflow: hidden;
        mask-image: linear-gradient(to bottom, transparent 0%, black 12%, black 88%, transparent 100%);
        -webkit-mask-image: linear-gradient(to bottom, transparent 0%, black 12%, black 88%, transparent 100%);
      }
      .hero-feed-column.left { left: 4vw; }
      .hero-feed-column.right { right: 4vw; }
      .hero-feed-track {
        --feed-gap: 18px;
        display: flex;
        flex-direction: column;
        gap: var(--feed-gap);
        animation: heroFeedRise var(--dur) linear infinite;
        will-change: transform;
      }
      .hero-feed-card {
        width: 100%;
        padding: 14px 16px;
        border-radius: 18px;
        backdrop-filter: blur(12px);
        opacity: 0.94;
        position: relative;
      }
      .hero-feed-card::after {
        content: '';
        position: absolute;
        inset: 0;
        border-radius: inherit;
        background: linear-gradient(135deg, rgba(255,255,255,0.05), transparent 55%);
        pointer-events: none;
      }
      .hero-scroll-indicator {
        letter-spacing: 0.18em;
        text-transform: uppercase;
      }
      @media (max-width: 900px) {
        .slide-content-grid {
          grid-template-columns: minmax(0, 1fr) !important;
          row-gap: 1.75rem !important;
        }
        .slide-text-cell {
          grid-column: 1 !important;
          grid-row: 1 !important;
        }
        .slide-media-cell {
          grid-column: 1 !important;
          grid-row: 2 !important;
        }
      }
    </style>
  </head>

      /* ---------- Cisco Logo ---------- */
      function CiscoLogo({ className, style }) {
        return (
          <img
            src="images/cisco-svgrepo-com.svg"
            alt="Cisco"
            className={className}
            style={style}
          />
        );
      }

      /* ---------- Chat Bubble ---------- */
      function ChatBubble({ role, text, variant, isDark }) {
        const isUser = role === 'user';
        const isAlert = variant === 'alert';
        let bg, textColor, borderCol;
        if (isAlert) {
          bg = isDark ? 'rgba(239,68,68,0.15)' : 'rgba(239,68,68,0.1)';
          textColor = isDark ? '#fca5a5' : '#dc2626';
          borderCol = isDark ? 'rgba(239,68,68,0.3)' : 'rgba(239,68,68,0.25)';
        } else if (isUser) {
          bg = isDark ? 'rgba(0,188,235,0.12)' : 'rgba(0,112,210,0.08)';
          textColor = isDark ? '#7dd3fc' : '#0070D2';
          borderCol = isDark ? 'rgba(0,188,235,0.25)' : 'rgba(0,112,210,0.2)';
        } else {
          bg = isDark ? 'rgba(255,255,255,0.06)' : 'rgba(0,0,0,0.04)';
          textColor = isDark ? 'rgba(255,255,255,0.8)' : 'rgba(0,0,0,0.7)';
          borderCol = isDark ? 'rgba(255,255,255,0.1)' : 'rgba(0,0,0,0.08)';
        }
        return (
          <div style={{
            background: bg,
            border: `1px solid ${borderCol}`,
            borderRadius: isUser ? '16px 16px 4px 16px' : '16px 16px 16px 4px',
            padding: '12px 16px',

            alignSelf: isUser ? 'flex-end' : 'flex-start',

          }}>
            {isAlert && <span style={{ fontSize: '13px', fontWeight: 600, color: textColor, display: 'block', marginBottom: 4 }}>⚠ Alert</span>}
            <span style={{ fontSize: '14px', lineHeight: '1.5', color: textColor, fontStyle: isUser ? 'italic' : 'normal' }}>{text}</span>
          </div>
        );
      }

      /* ---------- Image Placeholder ---------- */
      function ImagePlaceholder({ title, isDark, fill }) {
        return (
          <div style={{
            ...(fill
              ? { position: 'absolute', inset: 0, width: '100%', height: '100%' }
              : { width: '100%', height: '100%', minHeight: 0 }),
            display: 'flex',
            alignItems: 'center',
            justifyContent: 'center',
            borderRadius: '0.75rem',
            background: isDark ? 'rgba(255,255,255,0.03)' : 'rgba(0,0,0,0.03)',
            border: isDark ? '1px dashed rgba(255,255,255,0.1)' : '1px dashed rgba(0,0,0,0.1)',
          }}>
            <div style={{ textAlign: 'center', opacity: 0.4 }}>
              <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" style={{ margin: '0 auto 12px' }}>
                <rect x="3" y="3" width="18" height="18" rx="2" />
                <circle cx="8.5" cy="8.5" r="1.5" />
                <path d="M21 15l-5-5L5 21" />
              </svg>
              <div style={{ fontSize: '13px' }}>Screen mockup</div>
            </div>
          </div>
        );
      }

      /* ---------- Image With Fallback ---------- */
      function ImageWithFallback({ src, alt, isDark, style, fill }) {
        const [failed, setFailed] = React.useState(false);
        if (failed) return <ImagePlaceholder title={alt} isDark={isDark} fill={fill} />;
        const fillStyle = fill
          ? {
              position: 'absolute',
              inset: 0,
              width: '100%',
              height: '100%',
              objectFit: 'cover',
              objectPosition: 'center',
              borderRadius: '0.75rem',
              ...style,
            }
          : {
              borderRadius: '0.75rem',
              maxWidth: '100%',
              maxHeight: '100%',
              width: 'auto',
              height: 'auto',
              ...style,
            };
        return (
          <img
            src={src}
            alt={alt}
            className={fill ? 'object-cover' : 'object-contain'}
            style={fillStyle}
            onError={() => setFailed(true)}
          />
        );
      }

      /* ---------- Theme Toggle ---------- */
      function ThemeToggle({ isDark, onToggle }) {
        return (
          <div
            className="theme-toggle"
            onClick={onToggle}
            style={{
              background: isDark ? 'rgba(10,22,40,0.85)' : 'rgba(255,255,255,0.8)',
              borderColor: isDark ? 'rgba(255,255,255,0.12)' : 'rgba(0,0,0,0.12)',
              boxShadow: isDark
                ? '0 2px 16px rgba(0,0,0,0.4)'
                : '0 2px 16px rgba(0,0,0,0.1)',
            }}
          >
            <div
              className="toggle-track"
              style={{ background: isDark ? 'rgb(38,38,38)' : 'rgb(231,232,233)' }}
            >
              <div
                className="toggle-thumb"
                style={{
                  transform: isDark ? 'translateX(3px)' : 'translateX(19px)',
                  background: isDark ? 'rgb(0,188,235)' : 'rgb(0,112,210)',
                }}
              />
            </div>
            <span
              className="toggle-label"
              style={{ color: isDark ? 'rgba(255,255,255,0.6)' : 'rgba(0,0,0,0.5)' }}
            >
              {isDark ? '🌙 Dark' : '☀️ Light'}
            </span>
          </div>
        );
      }

      /* ---------- Mesh Background ---------- */
      function MeshBackground({ isDark }) {
        const canvasRef = React.useRef(null);

        React.useEffect(() => {
          const canvas = canvasRef.current;
          const ctx = canvas.getContext('2d');
          let animId;
          let t = 0;

          const stars = [];
          const sparkles = [];

          function resize() {
            const dpr = window.devicePixelRatio || 1;
            canvas.width = window.innerWidth * dpr;
            canvas.height = window.innerHeight * dpr;
            canvas.style.width = window.innerWidth + 'px';
            canvas.style.height = window.innerHeight + 'px';
          }
          resize();
          window.addEventListener('resize', resize);

          function draw() {
            t += 0.003;
            const dpr = window.devicePixelRatio || 1;
            const w = window.innerWidth;
            const h = window.innerHeight;

            ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

            if (isDark) {
              const grad = ctx.createLinearGradient(0, 0, w, h);
              grad.addColorStop(0, '#0a1628');
              grad.addColorStop(0.3, '#0d1f3c');
              grad.addColorStop(0.55, '#1a1a40');
              grad.addColorStop(0.75, '#3d1f56');
              grad.addColorStop(1, '#6b2a6e');
            ctx.fillStyle = grad;
            } else {
              const grad = ctx.createLinearGradient(0, 0, w, h);
              grad.addColorStop(0, '#e8f0fe');
              grad.addColorStop(0.4, '#dce6f7');
              grad.addColorStop(0.7, '#e8ddf5');
              grad.addColorStop(1, '#f0e4f7');
              ctx.fillStyle = grad;
            }
            ctx.fillRect(0, 0, w, h);

            if (isDark) {
              const nebula = ctx.createRadialGradient(w * 0.7, h * 0.65, 0, w * 0.7, h * 0.65, Math.max(w, h) * 0.55);
              nebula.addColorStop(0, 'rgba(120,40,120,0.25)');
              nebula.addColorStop(0.4, 'rgba(80,25,90,0.15)');
              nebula.addColorStop(1, 'rgba(0,0,0,0)');
              ctx.fillStyle = nebula;
              ctx.fillRect(0, 0, w, h);

              const nebula2 = ctx.createRadialGradient(w * 0.2, h * 0.3, 0, w * 0.2, h * 0.3, Math.max(w, h) * 0.5);
              nebula2.addColorStop(0, 'rgba(10,50,100,0.2)');
              nebula2.addColorStop(0.5, 'rgba(5,30,60,0.1)');
              nebula2.addColorStop(1, 'rgba(0,0,0,0)');
              ctx.fillStyle = nebula2;
              ctx.fillRect(0, 0, w, h);
            }

            animId = requestAnimationFrame(draw);
          }

          draw();
          return () => {
            cancelAnimationFrame(animId);
            window.removeEventListener('resize', resize);
          };
        }, [isDark]);

        return (
          <canvas
            ref={canvasRef}
            style={{ position: 'fixed', top: 0, left: 0, width: '100%', height: '100%', zIndex: 1, pointerEvents: 'none' }}
          />
        );
      }

      /* ---------- Side Bar Nav ---------- */
      function DotNav({ count, activeIndex, onJump, isDark }) {
        function getPhase(idx) {
          if (idx <= 2) return 'intro';
          if (idx >= 3 && idx <= 8) return 'discover';
          if (idx >= 9 && idx <= 13) return 'protect';
          if (idx >= 14 && idx <= 16) return 'monitor';
          if (idx === 17) return 'mission';
          return 'intro';
        }

        function getColor(idx) {
          const phase = getPhase(idx);
          if (phase === 'discover') return isDark ? '#00BCEB' : '#0077C8';
          if (phase === 'protect') return isDark ? '#F59E0B' : '#D97706';
          if (phase === 'monitor') return isDark ? '#22C55E' : '#16A34A';
          return isDark ? '#00BCEB' : '#0070D2';
        }

        const dimBg = isDark ? 'rgba(255,255,255,0.15)' : 'rgba(0,0,0,0.12)';

        return (
          <div
            className="fixed z-50 flex flex-col items-center gap-[5px]"
            style={{
              left: 16,
              top: '50%',
              transform: 'translateY(-50%)',
            }}
          >
            {Array.from({ length: count }).map((_, idx) => {
              const isActive = idx === activeIndex;
              const isPast = idx < activeIndex;
              const col = getColor(idx);

              return (
                <div
                  key={idx}
                  onClick={() => onJump(idx)}
                  style={{
                    width: 4,
                    height: isActive ? 28 : 14,
                    borderRadius: 2,
                    background: isActive ? col : isPast ? col : dimBg,
                    opacity: isActive ? 1 : isPast ? 0.55 : 0.35,
                    cursor: 'pointer',
                    transition: 'all 0.35s ease',
                    boxShadow: isActive ? `0 0 8px ${col}` : 'none',
                  }}
                  title={`Slide ${idx + 1}`}
                />
              );
            })}
          </div>
        );
      }

      /* ---------- Section ---------- */
      const Section = React.forwardRef(({ title, text, index, list, custom, image, video, isDark, chatBubbles }, ref) => {
        const [visible, setVisible] = React.useState(false);
        const localRef = React.useRef();
        const setRefs = el => {
          localRef.current = el;
          if (ref) ref(el);
        };

        React.useEffect(() => {
          const observer = new window.IntersectionObserver(
            ([entry]) => setVisible(entry.isIntersecting),
            { threshold: 0.3 }
          );
          if (localRef.current) observer.observe(localRef.current);
          return () => observer.disconnect();
        }, []);

        const videoRef = React.useRef(null);
        React.useEffect(() => {
          const vid = videoRef.current;

      /* ---------- App ---------- */
      function App() {
        const [activeIndex, setActiveIndex] = React.useState(0);
        const [isDark, setIsDark] = React.useState(true);
        const isScrolling = React.useRef(false);

        React.useEffect(() => {
          document.body.style.background = isDark ? '#0a1628' : 'var(--fz-color-neutral-1)';
          document.body.style.color = isDark ? '#f5f5f5' : 'var(--fz-color-neutral-5)';
        }, [isDark]);

        const wheelAccum = React.useRef(0);
        const WHEEL_THRESHOLD = 30;
        const COOLDOWN = 600;

        React.useEffect(() => {
          const handleWheel = (e) => {
            e.preventDefault();
            if (isScrolling.current) return;
            wheelAccum.current += e.deltaY;
            if (Math.abs(wheelAccum.current) < WHEEL_THRESHOLD) return;
            const direction = wheelAccum.current > 0 ? 1 : -1;
            wheelAccum.current = 0;
            isScrolling.current = true;
            setTimeout(() => { isScrolling.current = false; }, COOLDOWN);
            if (direction > 0 && activeIndex < sections.length - 1) {
              setActiveIndex(idx => Math.min(idx + 1, sections.length - 1));
            } else if (direction < 0 && activeIndex > 0) {
              setActiveIndex(idx => Math.max(idx - 1, 0));
            }
          };
          window.addEventListener('wheel', handleWheel, { passive: false });
          return () => { window.removeEventListener('wheel', handleWheel); wheelAccum.current = 0; };
        }, [activeIndex]);

        const handleJump = idx => setActiveIndex(idx);

        return (
          <div className="min-h-screen font-sans relative overflow-hidden" style={{ transition: 'background 0.4s ease' }}>
            <MeshBackground isDark={isDark} />
            <div style={{ position: 'relative', zIndex: 2 }}>
            <ThemeToggle isDark={isDark} onToggle={() => setIsDark(d => !d)} />
            {activeIndex !== 0 && <StickyLogo isDark={isDark} />}
            {activeIndex !== 0 && (
              <DotNav
                count={sections.length}
                activeIndex={activeIndex}
                onJump={handleJump}
                isDark={isDark}
              />
            )}
            <main>
              <Section
                key={activeIndex}
                title={sections[activeIndex].title}
                text={sections[activeIndex].text}
                index={activeIndex}
                list={sections[activeIndex].list}
                custom={sections[activeIndex].custom}
                image={sections[activeIndex].image}
                video={sections[activeIndex].video}
                chatBubbles={sections[activeIndex].chatBubbles}
                isDark={isDark}
              />
            </main>
            </div>
          </div>
        );
      }

      const root = ReactDOM.createRoot(document.getElementById('root'));
      root.render(<App />);
    </script>
  </body>
</html>
