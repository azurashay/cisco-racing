    <style>
      html, body { font-family: var(--fz-font-family-1, 'Cisco Sans', sans-serif) !important; }
      body {
        position: relative;
        overflow-x: hidden;
        transition: background 0.4s ease, color 0.4s ease;
      }
      .cisco-btn-primary {
        font-family: var(--fz-btn-global-font-family);
        font-size: var(--fz-btn-global-font-size);
        font-weight: var(--fz-btn-global-weight);
        line-height: var(--fz-btn-global-line-height);
        letter-spacing: var(--fz-btn-global-letter-spacing);
        padding: var(--fz-btn-primary-padding);
        border-radius: var(--fz-btn-primary-border-radius);
        transition: all 0.3s ease;
        cursor: pointer;
        outline: none;
        margin: 1rem 0;
      }
      .section-bg-cisco {
        background-color: transparent !important;
        background-image: none;
        position: relative;
        z-index: 3;
      }
      .section-content-cisco {
        position: relative;
        z-index: 5;
      }
      @keyframes bounce {
        0%, 100% { transform: translateY(0); }
        50% { transform: translateY(-10px); }
      }
      .phase-label {
        display: inline-block;
        padding: 0.3rem 0.9rem;
        border-radius: 999px;
        font-weight: var(--fz-weight-semi-bold);
        font-size: 0.65rem;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        margin-bottom: 1rem;
        border: 1.5px solid;
        background: transparent;
        transition: all 0.3s ease;
        width: fit-content;
      }
      .phase-label.discover {
        color: var(--fz-color-primary-4);
        border-color: rgba(0, 188, 235, 0.4);
      }
      .phase-label.protect {
        color: var(--fz-color-warning-3);
        border-color: rgba(245, 158, 11, 0.4);
      }
      .phase-label.monitor {
        color: var(--fz-color-success-3);
        border-color: rgba(34, 197, 94, 0.4);
      }
      .dot-nav-item { transition: all 0.3s ease; }
      .dot-nav-item:hover { transform: scale(1.3); }

      /* Theme toggle */
      .theme-toggle {
        position: fixed;
        top: 16px;
        right: 20px;
        z-index: 9999;
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 6px 10px 6px 6px;
        border-radius: 999px;
        cursor: pointer;
        border: 1px solid;
        transition: all 0.35s ease;
        backdrop-filter: blur(12px);
        user-select: none;
      }
      .toggle-track {
        width: 36px;
        height: 20px;
        border-radius: 999px;
        position: relative;
        transition: background 0.35s ease;
        flex-shrink: 0;
      }
      .toggle-thumb {
        position: absolute;
        top: 3px;
        width: 14px;
        height: 14px;
        border-radius: 50%;
        background: #fff;
        transition: transform 0.35s ease, background 0.35s ease;
        box-shadow: 0 1px 4px rgba(0,0,0,0.3);
      }
      .toggle-label {
        font-size: 0.7rem;
        font-weight: 600;
        letter-spacing: 0.06em;
        text-transform: uppercase;
        transition: color 0.35s ease;
      }
    </style>
  </head>

    <script type="text/babel">

      /* ---------- Theme Toggle ---------- */
      function ThemeToggle({ isDark, onToggle }) {
        return (
          <div
            className="theme-toggle"
            onClick={onToggle}
            style={{
              background: isDark ? 'rgba(0,5,56,0.75)' : 'rgba(255,255,255,0.8)',
              borderColor: isDark ? 'rgba(255,255,255,0.12)' : 'rgba(0,0,0,0.12)',
              boxShadow: isDark
                ? '0 2px 16px rgba(0,0,0,0.4)'
                : '0 2px 16px rgba(0,0,0,0.1)',
            }}
          >
            <div
              className="toggle-track"
              style={{ background: isDark ? 'rgb(13,39,77)' : 'rgb(231,232,233)' }}
            >
              <div
                className="toggle-thumb"
                style={{
                  transform: isDark ? 'translateX(3px)' : 'translateX(19px)',
                  background: isDark ? 'rgb(0,188,235)' : 'rgb(0,112,210)',
                }}
              />
            </div>
            <span
              className="toggle-label"
              style={{ color: isDark ? 'rgba(255,255,255,0.6)' : 'rgba(0,0,0,0.5)' }}
            >
              {isDark ? '🌙 Dark' : '☀️ Light'}
            </span>
          </div>
        );
      }

      /* ---------- Mesh Background ---------- */
      function MeshBackground({ isDark }) {
        const canvasRef = React.useRef(null);

        React.useEffect(() => {
          const canvas = canvasRef.current;
          const ctx = canvas.getContext('2d');
          let animId;
          let t = 0;
          let dots = [];
          const spacing = 90;
          const mouse = { x: -9999, y: -9999 };
          const mouseRadius = 250;
          const mouseForce = 55;

          function onMouseMove(e) { mouse.x = e.clientX; mouse.y = e.clientY; }
          function onMouseLeave() { mouse.x = -9999; mouse.y = -9999; }
          window.addEventListener('mousemove', onMouseMove);
          window.addEventListener('mouseleave', onMouseLeave);

          function buildDots() {
            dots = [];
            const w = window.innerWidth;
            const h = window.innerHeight;
            const cols = Math.ceil(w / spacing) + 1;
            const rows = Math.ceil(h / spacing) + 1;
            for (let r = 0; r < rows; r++) {
              for (let c = 0; c < cols; c++) {
                dots.push({
                  bx: c * spacing + (Math.random() - 0.5) * 30,
                  by: r * spacing + (Math.random() - 0.5) * 30,
                  x: 0, y: 0,
                  mx: 0, my: 0,
                  phase: Math.random() * Math.PI * 2,
                  speed: 0.4 + Math.random() * 0.6,
                  rad: 1.2 + Math.random() * 0.8,
                });
              }
            }
          }

          function resize() {
            const dpr = window.devicePixelRatio || 1;
            canvas.width = window.innerWidth * dpr;
            canvas.height = window.innerHeight * dpr;
            canvas.style.width = window.innerWidth + 'px';
            canvas.style.height = window.innerHeight + 'px';
            buildDots();
          }
          resize();
          window.addEventListener('resize', resize);

          const blobs = [
            { xr: 0.15, yr: 0.25, r: 600, px: 0,   py: 1.2, sx: 0.18, sy: 0.25, c: isDark ? [0, 81, 175]   : [182,217,242] },
            { xr: 0.80, yr: 0.45, r: 550, px: 2.1, py: 0.5, sx: 0.22, sy: 0.15, c: isDark ? [13, 39, 77]   : [206,230,252] },
            { xr: 0.45, yr: 0.08, r: 480, px: 4.0, py: 3.0, sx: 0.14, sy: 0.20, c: isDark ? [0, 112, 210]  : [182,217,242] },
            { xr: 0.10, yr: 0.80, r: 420, px: 1.5, py: 4.2, sx: 0.20, sy: 0.18, c: isDark ? [0, 51, 120]   : [206,230,252] },
            { xr: 0.60, yr: 0.75, r: 500, px: 3.3, py: 2.0, sx: 0.16, sy: 0.22, c: isDark ? [13, 39, 77]   : [230,241,252] },
            { xr: 0.90, yr: 0.15, r: 380, px: 5.0, py: 1.0, sx: 0.24, sy: 0.14, c: isDark ? [0, 81, 175]   : [182,217,242] },
            { xr: 0.35, yr: 0.55, r: 450, px: 1.0, py: 2.5, sx: 0.12, sy: 0.19, c: isDark ? [0, 60, 150]   : [195,225,250] },
          ];

          function draw() {
            t += 0.0015;
            const dpr = window.devicePixelRatio || 1;
            const w = window.innerWidth;
            const h = window.innerHeight;

            ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
            ctx.clearRect(0, 0, w, h);

            blobs.forEach((b, i) => {
              const drift = 160 + i * 20;
              const bx = b.xr * w + Math.sin(t * b.sx + b.px) * drift + Math.cos(t * 0.13 + i * 1.7) * 40;
              const by = b.yr * h + Math.cos(t * b.sy + b.py) * (drift * 0.7) + Math.sin(t * 0.17 + i * 2.3) * 30;
              const pulse = b.r + Math.sin(t * 0.4 + i * 0.8) * 70 + Math.cos(t * 0.25 + i) * 30;
              const grad = ctx.createRadialGradient(bx, by, 0, bx, by, pulse);
              const [cr, cg, cb] = b.c;
              const aBase = isDark ? 0.32 : 0.22;
              grad.addColorStop(0,   `rgba(${cr},${cg},${cb},${aBase})`);
              grad.addColorStop(0.2, `rgba(${cr},${cg},${cb},${aBase * 0.6})`);
              grad.addColorStop(0.5, `rgba(${cr},${cg},${cb},${aBase * 0.2})`);
              grad.addColorStop(0.75,`rgba(${cr},${cg},${cb},${aBase * 0.06})`);
              grad.addColorStop(1,   `rgba(${cr},${cg},${cb},0)`);
              ctx.fillStyle = grad;
              ctx.fillRect(0, 0, w, h);
            });

            const dotRgb  = isDark ? '182,217,242' : '0,81,175';
            const lineMax = isDark ? 0.1 : 0.07;
            const dotA    = isDark ? 0.2 : 0.14;
            const maxDist = 115;

            dots.forEach(d => {
              const baseX = d.bx + Math.sin(t * d.speed + d.phase) * 12;
              const baseY = d.by + Math.cos(t * d.speed * 0.7 + d.phase) * 12;

              const dx = baseX - mouse.x;
              const dy = baseY - mouse.y;
              const dist = Math.sqrt(dx * dx + dy * dy);

              let pushX = 0, pushY = 0;
              if (dist < mouseRadius && dist > 0) {
                const strength = (1 - dist / mouseRadius);
                const force = strength * strength * mouseForce;
                pushX = (dx / dist) * force;
                pushY = (dy / dist) * force;
              }

              d.mx += (pushX - d.mx) * 0.15;
              d.my += (pushY - d.my) * 0.15;

              d.x = baseX + d.mx;
              d.y = baseY + d.my;
            });

            ctx.lineWidth = 0.5;
            for (let i = 0; i < dots.length; i++) {
              const a = dots[i];
              for (let j = i + 1; j < dots.length; j++) {
                const b = dots[j];
                const dx = a.x - b.x;
                const dy = a.y - b.y;
                if (Math.abs(dx) > maxDist || Math.abs(dy) > maxDist) continue;
                const dist = Math.sqrt(dx * dx + dy * dy);
                if (dist < maxDist) {
                  ctx.strokeStyle = `rgba(${dotRgb},${(1 - dist / maxDist) * lineMax})`;
                  ctx.beginPath();
                  ctx.moveTo(a.x, a.y);
                  ctx.lineTo(b.x, b.y);
                  ctx.stroke();
                }
              }
            }

            dots.forEach(d => {
              ctx.beginPath();
              ctx.arc(d.x, d.y, d.rad, 0, Math.PI * 2);
              ctx.fillStyle = `rgba(${dotRgb},${dotA})`;
              ctx.fill();
            });

            animId = requestAnimationFrame(draw);
          }

          draw();
          return () => {
            cancelAnimationFrame(animId);
            window.removeEventListener('resize', resize);
            window.removeEventListener('mousemove', onMouseMove);
            window.removeEventListener('mouseleave', onMouseLeave);
          };
        }, [isDark]);

        return (
          <canvas
            ref={canvasRef}
            style={{ position: 'fixed', top: 0, left: 0, width: '100%', height: '100%', zIndex: 1, pointerEvents: 'none' }}
          />
        );
      }

      /* ---------- F1 Circuit Nav ---------- */
      function DotNav({ count, activeIndex, onJump, isDark }) {
        const W = 380, H = 200;

        const circuit = [
          { x: 150, y: 180 },
          { x: 110, y: 170 },
          { x: 70,  y: 155 },
          { x: 40,  y: 130 },
          { x: 25,  y: 100 },
          { x: 30,  y: 68 },
          { x: 55,  y: 40 },
          { x: 95,  y: 20 },
          { x: 145, y: 15 },
          { x: 195, y: 25 },
          { x: 240, y: 45 },
          { x: 280, y: 60 },
          { x: 330, y: 55 },
          { x: 355, y: 75 },
          { x: 355, y: 110 },
          { x: 330, y: 140 },
          { x: 280, y: 165 },
        ];

        const points = circuit.slice(0, count);

        function smoothPath(pts, close) {
          if (pts.length < 2) return '';
          let d = `M ${pts[0].x} ${pts[0].y}`;
          for (let i = 1; i < pts.length; i++) {
            const p0 = pts[i - 1];
            const p1 = pts[i];
            const mx = (p0.x + p1.x) / 2;
            const my = (p0.y + p1.y) / 2;
            d += ` Q ${p0.x} ${p0.y}, ${mx} ${my}`;
          }
          const last = pts[pts.length - 1];
          d += ` L ${last.x} ${last.y}`;
          if (close) {
            const first = pts[0];
            const mx = (last.x + first.x) / 2;
            const my = (last.y + first.y) / 2;
            d += ` Q ${last.x} ${last.y}, ${mx} ${my} L ${first.x} ${first.y}`;
          }
          return d;
        }

        const fullPath = smoothPath(points, true);
        const pastPath = activeIndex > 0 ? smoothPath(points.slice(0, activeIndex + 1), false) : '';

        const trackBg = isDark ? 'rgba(255,255,255,0.06)' : 'rgba(0,0,0,0.06)';
        const labelCol = isDark ? 'rgba(182,217,242,0.55)' : 'rgba(0,81,175,0.45)';

        const phaseColors = {
          discover: '#00BCEB',
          protect:  '#F59E0B',
          monitor:  '#22C55E',
          intro:    isDark ? 'rgba(182,217,242,0.5)' : 'rgba(0,112,210,0.4)',
        };

        function getPhase(idx) {
          if (idx <= 1) return 'intro';
          if (idx >= 2 && idx <= 7) return 'discover';
          if (idx >= 8 && idx <= 12) return 'protect';
          if (idx >= 13 && idx <= 15) return 'monitor';
          return 'intro';
        }

        function getSegmentColor(idx) {
          const phase = getPhase(idx);
          if (phase === 'discover') return isDark ? '#00BCEB' : '#0077C8';
          if (phase === 'protect') return isDark ? '#F59E0B' : '#D97706';
          if (phase === 'monitor') return isDark ? '#22C55E' : '#16A34A';
          return isDark ? '#00BCEB' : '#0070D2';
        }

        const pastSegments = [];
        if (activeIndex > 0) {
          let segStart = 0;
          let currentColor = getSegmentColor(0);
          for (let i = 1; i <= activeIndex; i++) {
            const col = getSegmentColor(i);
            if (col !== currentColor || i === activeIndex) {
              const end = col !== currentColor ? i : i + 1;
              pastSegments.push({
                path: smoothPath(points.slice(segStart, Math.min(end, points.length)), false),
                color: currentColor,
              });
              if (col !== currentColor) {
                segStart = i;
                currentColor = col;
                if (i === activeIndex) {
                  pastSegments.push({
                    path: smoothPath(points.slice(segStart, segStart + 1), false),
                    color: currentColor,
                  });
                }
              }
            }
          }
        }

        return (
          <div className="fixed bottom-3 left-3 z-50" style={{ width: W + 10, height: H + 20 }}>
            <svg width={W + 10} height={H + 10} viewBox={`-5 -5 ${W+10} ${H+10}`}>
              <path d={fullPath} fill="none" stroke={trackBg} strokeWidth="5" strokeLinecap="round" strokeLinejoin="round" />
              <path d={fullPath} fill="none" stroke={trackBg} strokeWidth="5" strokeLinecap="round" strokeLinejoin="round"
                strokeDasharray="2 6" />

              {pastSegments.map((seg, i) => (
                <path key={i} d={seg.path} fill="none" stroke={seg.color} strokeWidth="4"
                  strokeLinecap="round" strokeLinejoin="round" opacity="0.7" />
              ))}

              {points.map((pt, idx) => {
                const isActive = idx === activeIndex;
                const isPast = idx < activeIndex;
                const phase = getPhase(idx);
                const col = isActive || isPast ? getSegmentColor(idx) : trackBg;

                return (
                  <g key={idx} onClick={() => onJump(idx)} style={{ cursor: 'pointer' }}>
                    {isActive && (
                      <React.Fragment>
                        <circle cx={pt.x} cy={pt.y} r="13" fill="none" stroke={col} strokeWidth="1.5" opacity="0.35" />
                        <circle cx={pt.x} cy={pt.y} r="18" fill="none" stroke={col} strokeWidth="0.5" opacity="0.15" />
                      </React.Fragment>
                    )}

                    <circle cx={pt.x} cy={pt.y} r={isActive ? 7 : isPast ? 4.5 : 3.5}
                      fill={isActive || isPast ? col : (isDark ? 'rgba(255,255,255,0.1)' : 'rgba(0,0,0,0.06)')}
                      stroke={isDark ? 'rgba(0,0,0,0.3)' : 'rgba(255,255,255,0.8)'} strokeWidth="1"
                    />

                    {isActive && (
                      <circle cx={pt.x} cy={pt.y} r="7" fill={col}
                        style={{ filter: `drop-shadow(0 0 8px ${col})` }} />
                    )}

                    <text x={pt.x} y={pt.y - (isActive ? 16 : 10)}
                      textAnchor="middle" fontSize={isActive ? '8' : '6.5'}
                      fontFamily="monospace" fontWeight={isActive ? '700' : '500'}
                      fill={isActive ? col : isPast ? labelCol : (isDark ? 'rgba(255,255,255,0.15)' : 'rgba(0,0,0,0.12)')}
                    >
                      {String(idx + 1).padStart(2, '0')}
                    </text>
                  </g>
                );
              })}

              <g transform={`translate(${points[0].x + 12}, ${points[0].y - 2})`}>
                {[0,1,2,3].map(i => (
                  <rect key={i} x={(i % 2) * 3} y={Math.floor(i / 2) * 3} width="3" height="3"
                    fill={i % 2 === Math.floor(i / 2) % 2
                      ? (isDark ? 'rgba(255,255,255,0.6)' : 'rgba(0,0,0,0.5)')
                      : (isDark ? 'rgba(255,255,255,0.15)' : 'rgba(0,0,0,0.1)')
                    } />
                ))}
              </g>
            </svg>

            <div style={{
              position: 'absolute', bottom: 0, right: 8,
              fontSize: '8px', fontFamily: 'monospace', fontWeight: 600,
              color: labelCol, letterSpacing: '0.12em', textTransform: 'uppercase',
            }}>
              {getPhase(activeIndex) !== 'intro' ? getPhase(activeIndex) : 'start'} · {String(activeIndex + 1).padStart(2, '0')}/{String(count).padStart(2, '0')}
            </div>
          </div>
        );
      }

      /* ---------- Section ---------- */
      const Section = React.forwardRef(({ title, text, index, list, custom, image, video, isDark }, ref) => {
        const [visible, setVisible] = React.useState(false);
        const localRef = React.useRef();
        const setRefs = el => {
          localRef.current = el;
          if (ref) ref(el);
        };

        React.useEffect(() => {
          const observer = new window.IntersectionObserver(
            ([entry]) => setVisible(entry.isIntersecting),
            { threshold: 0.3 }
          );
          if (localRef.current) observer.observe(localRef.current);
          return () => observer.disconnect();
        }, []);

        const videoRef = React.useRef(null);
        React.useEffect(() => {
          const vid = videoRef.current;
          if (!vid) return;
          const timeout = setTimeout(() => {
            if (vid.paused) vid.play().catch(() => {});
          }, 200);
          return () => clearTimeout(timeout);
        }, [index, video]);

        const bg = 'transparent';

        /* ---- Intro ---- */
        if (custom === 'intro') {
          const [activeNotification, setActiveNotification] = React.useState(0);
          const notifications = [
            { icon: 'N', iconColor: '#3b82f6', source: 'Cyber News', message: "Dev teams juggling timelines and security requirements", time: 'Just now' },
            { icon: 'N', iconColor: '#3b82f6', source: 'Network Security News', message: "Ransomware is more ruthless than ever", time: 'Just now' },
            { icon: 'CSN', iconColor: '#ef4444', source: 'Cyber Security News', message: "Major business disruptions from cyberattacks continue worldwide", time: 'Just now' },
            { icon: 'F', iconColor: '#10b981', source: 'Forrester Consulting', message: "163% ROI with software firewalls across environments", time: 'Just now' },
            { icon: '💬', iconColor: '#8b5cf6', source: 'Slack · Anil', message: "Thoughts on how we meet app deadlines with new security requirements?", time: 'Just now' },
            { icon: 'N', iconColor: '#3b82f6', source: 'Cyber News', message: "Poll: Cloud Application Security Still Falls Short", time: 'Just now' },
            { icon: '💬', iconColor: '#8b5cf6', source: 'Slack · Ron', message: "The sweepstakes app needs to be secured. Do we have a plan?", time: 'Just now' },
            { icon: '📅', iconColor: '#10b981', source: 'Calendar', message: "Cross-cloud security visibility (attendance required)", time: 'Just now' },
            { icon: 'F', iconColor: '#10b981', source: 'Cyber Security News', message: "Costs can top $1B from cyberattacks across industries", time: 'Just now' },
            { icon: '💬', iconColor: '#8b5cf6', source: 'Slack · Prajakta', message: "Compliance team noticed a shadow IT app collecting customer data", time: 'Just now' },
          ];

          React.useEffect(() => {
            const interval = setInterval(() => {
              setActiveNotification(prev => (prev + 1) % notifications.length);
            }, 3000);
            return () => clearInterval(interval);
          }, []);

          const notifBgActive = isDark ? 'rgba(0,5,56,0.85)' : 'rgba(255,255,255,0.95)';
          const notifBgIdle   = isDark ? 'rgba(0,5,56,0.35)' : 'rgba(255,255,255,0.5)';
          const notifText     = isDark ? 'var(--fz-color-neutral-2)' : 'var(--fz-color-neutral-5)';
          const notifSub      = isDark ? 'var(--fz-color-neutral-3)' : 'var(--fz-color-neutral-4)';
          const headingColor  = isDark ? 'var(--fz-color-neutral-0)' : 'var(--fz-color-neutral-5)';
          const subColor      = isDark ? 'var(--fz-color-primary-3)' : 'var(--fz-color-neutral-4)';

          return (
            <section
              ref={setRefs}
              dir="ltr"
              className="h-screen relative overflow-hidden"
              style={{ background: 'transparent' }}
            >
              <div className="absolute inset-0 pointer-events-none" style={{zIndex: 2}}>
                {notifications.map((notif, idx) => {
                  const positions = [
                    { top: '10%', left: '5%' }, { top: '20%', left: '8%' },
                    { top: '30%', left: '6%' }, { top: '40%', left: '4%' },
                    { top: '50%', left: '7%' }, { top: '15%', right: '5%' },
                    { top: '25%', right: '8%' }, { top: '35%', right: '6%' },
                    { top: '45%', right: '4%' }, { top: '55%', right: '7%' },
                  ];
                  const isActive = idx === activeNotification;
                  return (
                    <div
                      key={idx}
                      className="rounded-lg p-3 max-w-xs shadow-lg transition-all duration-500"
                      style={{
                        position: 'absolute',
                        ...positions[idx % positions.length],
                        zIndex: 2,
                        opacity: isActive ? 1 : 0.3,
                        transform: isActive ? 'scale(1.05)' : 'scale(1)',
                        backgroundColor: isActive ? notifBgActive : notifBgIdle,
                        border: isDark ? 'none' : '1px solid rgba(0,0,0,0.07)',
                      }}
                    >
                      <div className="flex items-center gap-2 mb-1">
                        <span className="text-sm font-bold" style={{color: notif.iconColor}}>{notif.icon}</span>
                        <span className="text-xs font-semibold" style={{color: notifSub}}>{notif.source}</span>
                        <span className="text-xs ml-auto" style={{color: notifSub, opacity: 0.7}}>{notif.time}</span>
                      </div>
                      <div className="text-xs" style={{color: notifText}}>{notif.message}</div>
                    </div>
                  );
                })}
              </div>

              <div className="absolute inset-0 flex flex-col items-center justify-center" style={{zIndex: 10}}>
                <img src="banner/Cisco-logo.png" alt="Cisco Logo" className="h-16 md:h-20 w-auto mb-8" />
                <div className="text-center max-w-3xl px-4">
                  <div className="text-lg md:text-xl mb-3" style={{color: subColor, fontWeight: 'var(--fz-weight-regular)'}}>
                    You are a security leader of a
                  </div>
                  <h1 className="text-3xl md:text-5xl lg:text-6xl mb-4 leading-tight" style={{color: headingColor, fontWeight: 'var(--fz-weight-light)'}}>
                    Hybrid Datacenter
                  </h1>
                  <div className="text-xl md:text-2xl" style={{color: subColor, fontWeight: 'var(--fz-weight-medium)'}}>
                    running critical applications using AI
                  </div>
                </div>
              </div>

              <div
                className="absolute bottom-8 left-1/2 transform -translate-x-1/2 text-sm"
                style={{zIndex: 10, animation: 'bounce 2s infinite', color: isDark ? 'rgba(255,255,255,0.5)' : 'rgba(0,0,0,0.4)'}}
              >
                Scroll to begin
              </div>
            </section>
          );
        }

        /* ---- Outro ---- */
        if (custom) {
          const headingColor = isDark ? 'var(--fz-color-primary-3)' : 'var(--fz-color-primary-7)';
          const cardBg       = isDark ? 'rgba(0,5,56,0.4)' : 'rgba(255,255,255,0.7)';
          const cardText     = isDark ? 'var(--fz-color-neutral-0)' : 'var(--fz-color-neutral-5)';
          const listText     = isDark ? 'var(--fz-color-neutral-2)' : 'var(--fz-color-neutral-4)';
          const btnColor     = isDark ? 'var(--fz-color-primary-4)' : 'var(--fz-color-primary-5)';

          return (
            <section
              ref={setRefs}
              dir="ltr"
              className={`section-bg-cisco h-screen grid grid-cols-1 md:grid-cols-2 items-center justify-center px-6 md:px-24 gap-16 transition-all duration-700 ${visible ? 'opacity-100 translate-y-0' : 'opacity-0 translate-y-12'}`}
              style={{ position: 'relative', overflow: 'hidden', background: 'transparent' }}
            >
              <div className="flex flex-col justify-center items-start md:items-end section-content-cisco z-10">
                <div className="text-[40px] md:text-[64px] leading-tight mb-16 text-left md:text-right" style={{color: headingColor, fontWeight: 'var(--fz-weight-light)'}}>
                  Any workload.<br/>Any connection.<br/>Any cloud.
                </div>
              </div>
              <div className="flex flex-col justify-center items-start p-8 rounded-xl max-w-xl section-content-cisco z-10"
                style={{ background: cardBg, border: isDark ? 'none' : '1px solid rgba(0,0,0,0.08)', backdropFilter: 'blur(8px)' }}>
                <div className="text-xl mb-4" style={{color: cardText, fontWeight: 'var(--fz-weight-medium)'}}>Secured with Cisco Hybrid Mesh Firewall</div>
                <ul className="mb-4 space-y-2 list-disc pl-6 text-lg" style={{color: listText}}>
                  <li>Faster policy deployment with unified management</li>
                  <li>Reduction in operational overhead</li>
                  <li>End-to-end visibility into encrypted traffic, user identity, and application behavior</li>
                </ul>
                <button
                  className="cisco-btn-primary text-lg px-8 py-3"
                  style={{border:`2px solid ${btnColor}`, background:'transparent', color: btnColor}}
                >
                  GET STARTED
                </button>
              </div>
            </section>
          );
        }

        /* ---- Regular section ---- */
        const getPhaseLabel = (t) => {
          if (t.startsWith('PHASE 1: DISCOVER')) return { label: 'PHASE 1: DISCOVER', type: 'discover', rest: t.replace('PHASE 1: DISCOVER - ', '') };
          if (t.startsWith('PHASE 2: PROTECT'))  return { label: 'PHASE 2: PROTECT',  type: 'protect',  rest: t.replace('PHASE 2: PROTECT - ', '') };
          if (t.startsWith('PHASE 3: MONITOR'))  return { label: 'PHASE 3: MONITOR',  type: 'monitor',  rest: t.replace('PHASE 3: MONITOR - ', '') };
          return null;
        };
        const phaseInfo = getPhaseLabel(title);

        const titleColor = isDark ? 'var(--fz-color-neutral-0)' : 'var(--fz-color-primary-7)';
        const textColor  = isDark ? 'var(--fz-color-neutral-3)' : 'var(--fz-color-neutral-4)';
        const divider    = isDark ? 'rgba(255,255,255,0.06)' : 'rgba(0,0,0,0.07)';

        return (
          <section
            ref={setRefs}
            dir="ltr"
            className={`section-bg-cisco h-screen grid items-start px-8 md:px-16 transition-all duration-700 ${visible ? 'opacity-100 translate-y-0' : 'opacity-0 translate-y-12'}`}
            style={{ gridTemplateColumns: '1fr 2fr', gap: 0, background: 'transparent', paddingTop: '12vh' }}
          >
            <div
              className="section-content-cisco flex flex-col justify-start pl-4 pr-10"
              style={{ borderRight: `1px solid ${divider}` }}
            >
              {phaseInfo && (
                <span className={`phase-label ${phaseInfo.type}`}>
                  {phaseInfo.label}
                </span>
              )}
              <h2
                className="text-3xl md:text-4xl lg:text-5xl mb-6 leading-tight"
                style={{ color: titleColor, fontWeight: 'var(--fz-weight-light)' }}
              >
                {phaseInfo ? phaseInfo.rest : title}
              </h2>
              {list ? (
                <ul className="list-disc text-xl md:text-2xl max-w-xl" style={{color: textColor}}>
                  {list.map((item, i) => <li key={i}>{item}</li>)}
                </ul>
              ) : (
                <pre
                  className="text-lg md:text-xl whitespace-pre-line leading-relaxed"
                  style={{background:'none', fontFamily:'inherit', color: textColor, fontWeight: 'var(--fz-weight-regular)'}}
                >
                  {text}
                </pre>
              )}
            </div>
            <div className="section-content-cisco flex justify-center items-start py-0 pl-10">
              <div className="rounded-xl max-h-[88vh] w-full overflow-hidden flex justify-center items-center">
                {image ? (
                  <img
                    src={image}
                    alt={title}
                    className="object-contain w-full max-h-[88vh]"
                    style={{ borderRadius: '0.75rem' }}
                  />
                ) : video ? (
                  <video
                    ref={videoRef}
                    src={video}
                    autoPlay muted playsInline preload="auto"
                    className="object-cover w-full max-h-[88vh]"
                    style={{ borderRadius: '0.75rem' }}
                  />
                ) : null}
              </div>
            </div>
          </section>
        );
      });

      /* ---------- Sticky Logo ---------- */
      function StickyLogo({ isDark }) {
        return (
          <header
            className="sticky top-0 z-50 flex justify-center items-center py-4 shadow-sm"
            style={{
              background: isDark ? 'rgba(0,5,56,0.88)' : 'rgba(244,245,248,0.9)',
              backdropFilter: 'blur(12px)',
              borderBottom: isDark ? '1px solid rgba(255,255,255,0.05)' : '1px solid rgba(0,0,0,0.07)',
              transition: 'all 0.4s ease',
            }}
          >
            <img src="banner/Cisco-logo.png" alt="Cisco Logo" className="h-10 w-auto mx-auto" />
          </header>
        );
      }

      /* ---------- App ---------- */
      function App() {
        const [activeIndex, setActiveIndex] = React.useState(0);
        const [isDark, setIsDark] = React.useState(true);
        const isScrolling = React.useRef(false);

        React.useEffect(() => {
          document.body.style.background = isDark ? 'rgb(0,5,56)' : 'var(--fz-color-neutral-1)';
          document.body.style.color = isDark ? 'var(--fz-color-neutral-1)' : 'var(--fz-color-neutral-5)';
        }, [isDark]);

        React.useEffect(() => {
          const handleWheel = (e) => {
            e.preventDefault();
            if (isScrolling.current) return;
            isScrolling.current = true;
            setTimeout(() => { isScrolling.current = false; }, 600);
            if (e.deltaY > 0 && activeIndex < sections.length - 1) {
              setActiveIndex(idx => Math.min(idx + 1, sections.length - 1));
            } else if (e.deltaY < 0 && activeIndex > 0) {
              setActiveIndex(idx => Math.max(idx - 1, 0));
            }
          };
          window.addEventListener('wheel', handleWheel, { passive: false });
          return () => window.removeEventListener('wheel', handleWheel);
        }, [activeIndex]);

        const handleJump = idx => setActiveIndex(idx);

        return (
          <div className="min-h-screen font-sans relative overflow-hidden" style={{ transition: 'background 0.4s ease' }}>
            <MeshBackground isDark={isDark} />
            <div style={{ position: 'relative', zIndex: 2 }}>
            <ThemeToggle isDark={isDark} onToggle={() => setIsDark(d => !d)} />
            {activeIndex !== 0 && <StickyLogo isDark={isDark} />}
            {activeIndex !== 0 && (
              <DotNav
                count={sections.length}
                activeIndex={activeIndex}
                onJump={handleJump}
                isDark={isDark}
              />
            )}
            <main>
              <Section
                key={activeIndex}
                title={sections[activeIndex].title}
                text={sections[activeIndex].text}
                index={activeIndex}
                list={sections[activeIndex].list}
                custom={sections[activeIndex].custom}
                image={sections[activeIndex].image}
                video={sections[activeIndex].video}
                isDark={isDark}
              />
            </main>
            </div>
          </div>
        );
      }

      const root = ReactDOM.createRoot(document.getElementById('root'));
      root.render(<App />);
    </script>
  </body>
</html>
