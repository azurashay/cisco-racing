<!DOCTYPE html>
<html lang="he" dir="ltr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cisco Hybrid Mesh Firewall</title>
    <link rel="stylesheet" href="theme/cisco_theme.css" />
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      html, body { font-family: var(--fz-font-family-1, 'Cisco Sans', sans-serif) !important; }
      body {
        position: relative;
        overflow-x: hidden;
        transition: background 0.4s ease, color 0.4s ease;
      }
      .cisco-btn-primary {
        font-family: var(--fz-btn-global-font-family);
        font-size: var(--fz-btn-global-font-size);
        font-weight: var(--fz-btn-global-weight);
        line-height: var(--fz-btn-global-line-height);
        letter-spacing: var(--fz-btn-global-letter-spacing);
        padding: var(--fz-btn-primary-padding);
        border-radius: var(--fz-btn-primary-border-radius);
        transition: all 0.3s ease;
        cursor: pointer;
        outline: none;
        margin: 1rem 0;
      }
      .section-bg-cisco {
        background-color: transparent !important;
        background-image: none;
        position: relative;
        z-index: 3;
      }
      .section-content-cisco {
        position: relative;
        z-index: 5;
      }
      @keyframes bounce {
        0%, 100% { transform: translateY(0); }
        50% { transform: translateY(-10px); }
      }
      .phase-label {
        display: inline-block;
        padding: 0.3rem 0.9rem;
        border-radius: 999px;
        font-weight: var(--fz-weight-semi-bold);
        font-size: 0.65rem;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        margin-bottom: 1rem;
        border: 1.5px solid;
        background: transparent;
        transition: all 0.3s ease;
        width: fit-content;
      }
      .phase-label.discover {
        color: var(--fz-color-primary-4);
        border-color: rgba(0, 188, 235, 0.4);
      }
      .phase-label.protect {
        color: var(--fz-color-warning-3);
        border-color: rgba(245, 158, 11, 0.4);
      }
      .phase-label.monitor {
        color: var(--fz-color-success-3);
        border-color: rgba(34, 197, 94, 0.4);
      }
      .dot-nav-item { transition: all 0.3s ease; }
      .dot-nav-item:hover { transform: scale(1.3); }

      /* Theme toggle */
      .theme-toggle {
        position: fixed;
        top: 16px;
        right: 20px;
        z-index: 9999;
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 6px 10px 6px 6px;
        border-radius: 999px;
        cursor: pointer;
        border: 1px solid;
        transition: all 0.35s ease;
        backdrop-filter: blur(12px);
        user-select: none;
      }
      .toggle-track {
        width: 36px;
        height: 20px;
        border-radius: 999px;
        position: relative;
        transition: background 0.35s ease;
        flex-shrink: 0;
      }
      .toggle-thumb {
        position: absolute;
        top: 3px;
        width: 14px;
        height: 14px;
        border-radius: 50%;
        background: #fff;
        transition: transform 0.35s ease, background 0.35s ease;
        box-shadow: 0 1px 4px rgba(0,0,0,0.3);
      }
      .toggle-label {
        font-size: 0.7rem;
        font-weight: 600;
        letter-spacing: 0.06em;
        text-transform: uppercase;
        transition: color 0.35s ease;
      }
      @keyframes heroFeedRise {
        from {
          transform: translateY(0);
        }
        to {
          transform: translateY(-50%);
        }
      }
      .hero-frame {
        position: absolute;
        inset: 0;
        overflow: hidden;
      }
      .hero-video {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        object-fit: cover;
        filter: blur(3px) saturate(0.72) brightness(0.4);
        transform: scale(1.06);
      }
      .hero-overlay {
        position: absolute;
        inset: 0;
        background:
          radial-gradient(circle at 50% 42%, rgba(0, 188, 235, 0.08), transparent 28%),
          radial-gradient(circle at 20% 20%, rgba(0, 188, 235, 0.05), transparent 30%),
          radial-gradient(circle at 80% 24%, rgba(0, 112, 210, 0.04), transparent 30%),
          linear-gradient(180deg, rgba(13, 13, 13, 0.3) 0%, rgba(13, 13, 13, 0.75) 55%, rgba(13, 13, 13, 0.95) 100%);
      }
      .hero-overlay-light {
        background:
          radial-gradient(circle at 50% 42%, rgba(220, 235, 250, 0.3), transparent 28%),
          radial-gradient(circle at 20% 20%, rgba(200, 230, 255, 0.2), transparent 30%),
          radial-gradient(circle at 80% 24%, rgba(200, 225, 250, 0.15), transparent 30%),
          linear-gradient(180deg, rgba(244, 245, 248, 0.75) 0%, rgba(244, 245, 248, 0.88) 55%, rgba(244, 245, 248, 0.95) 100%) !important;
      }
      .hero-overlay::before,
      .hero-overlay::after {
        content: '';
        position: absolute;
        top: 0;
        width: 92px;
        height: 140px;
        opacity: 0.5;
        background:
          repeating-linear-gradient(
            90deg,
            rgba(255, 255, 255, 0.08) 0,
            rgba(255, 255, 255, 0.08) 10px,
            transparent 10px,
            transparent 22px
          );
        clip-path: polygon(0 0, 100% 0, 100% 78%, 70% 100%, 40% 72%, 0 100%);
      }
      .hero-overlay::before { left: 0; }
      .hero-overlay::after {
        right: 0;
        transform: scaleX(-1);
      }
      .hero-feed-column {
        position: absolute;
        top: 9vh;
        bottom: 9vh;
        width: min(26vw, 320px);
        overflow: hidden;
        mask-image: linear-gradient(to bottom, transparent 0%, black 12%, black 88%, transparent 100%);
        -webkit-mask-image: linear-gradient(to bottom, transparent 0%, black 12%, black 88%, transparent 100%);
      }
      .hero-feed-column.left { left: 4vw; }
      .hero-feed-column.right { right: 4vw; }
      .hero-feed-track {
        --feed-gap: 18px;
        display: flex;
        flex-direction: column;
        gap: var(--feed-gap);
        animation: heroFeedRise var(--dur) linear infinite;
        will-change: transform;
      }
      .hero-feed-card {
        width: 100%;
        padding: 14px 16px;
        border-radius: 18px;
        backdrop-filter: blur(12px);
        opacity: 0.94;
        position: relative;
      }
      .hero-feed-card::after {
        content: '';
        position: absolute;
        inset: 0;
        border-radius: inherit;
        background: linear-gradient(135deg, rgba(255,255,255,0.05), transparent 55%);
        pointer-events: none;
      }
      .hero-scroll-indicator {
        letter-spacing: 0.18em;
        text-transform: uppercase;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="text/babel">

      const ThemeContext = React.createContext(true);

      const sections = [
        { title: 'Intro', custom: 'intro' },
        {

      /* ---------- Theme Toggle ---------- */
      function ThemeToggle({ isDark, onToggle }) {
        return (
          <div
            className="theme-toggle"
            onClick={onToggle}
            style={{
              background: isDark ? 'rgba(10,22,40,0.85)' : 'rgba(255,255,255,0.8)',
              borderColor: isDark ? 'rgba(255,255,255,0.12)' : 'rgba(0,0,0,0.12)',
              boxShadow: isDark
                ? '0 2px 16px rgba(0,0,0,0.4)'
                : '0 2px 16px rgba(0,0,0,0.1)',
            }}
          >
            <div
              className="toggle-track"
              style={{ background: isDark ? 'rgb(38,38,38)' : 'rgb(231,232,233)' }}
            >
              <div
                className="toggle-thumb"
                style={{
                  transform: isDark ? 'translateX(3px)' : 'translateX(19px)',
                  background: isDark ? 'rgb(0,188,235)' : 'rgb(0,112,210)',
                }}
              />
            </div>
            <span
              className="toggle-label"
              style={{ color: isDark ? 'rgba(255,255,255,0.6)' : 'rgba(0,0,0,0.5)' }}
            >
              {isDark ? '🌙 Dark' : '☀️ Light'}
            </span>
          </div>
        );
      }

      /* ---------- Mesh Background ---------- */
      function MeshBackground({ isDark }) {
        const canvasRef = React.useRef(null);

        React.useEffect(() => {
          const canvas = canvasRef.current;
          const ctx = canvas.getContext('2d');
          let animId;
          let t = 0;

          const stars = [];
          const STAR_COUNT = 180;
          for (let i = 0; i < STAR_COUNT; i++) {
            stars.push({
              x: Math.random(),
              y: Math.random(),
              r: 0.4 + Math.random() * 1.2,
              phase: Math.random() * Math.PI * 2,
              speed: 0.3 + Math.random() * 0.7,
              brightness: 0.3 + Math.random() * 0.7,
            });
          }

          const sparkles = [];
          const SPARKLE_COUNT = 3;
          for (let i = 0; i < SPARKLE_COUNT; i++) {
            sparkles.push({
              x: 0.6 + Math.random() * 0.35,
              y: 0.5 + Math.random() * 0.45,
              phase: Math.random() * Math.PI * 2,
              speed: 0.4 + Math.random() * 0.3,
              size: 6 + Math.random() * 8,
            });
          }

          function resize() {
            const dpr = window.devicePixelRatio || 1;
            canvas.width = window.innerWidth * dpr;
            canvas.height = window.innerHeight * dpr;
            canvas.style.width = window.innerWidth + 'px';
            canvas.style.height = window.innerHeight + 'px';
          }
          resize();
          window.addEventListener('resize', resize);

          function drawStar4(cx, cy, size, alpha) {
            ctx.save();
            ctx.globalAlpha = alpha;
            ctx.fillStyle = '#c8b8e8';
            ctx.beginPath();
            const spikes = 4;
            const outerR = size;
            const innerR = size * 0.25;
            for (let i = 0; i < spikes * 2; i++) {
              const angle = (i * Math.PI) / spikes - Math.PI / 2;
              const r = i % 2 === 0 ? outerR : innerR;
              const sx = cx + Math.cos(angle) * r;
              const sy = cy + Math.sin(angle) * r;
              if (i === 0) ctx.moveTo(sx, sy);
              else ctx.lineTo(sx, sy);
            }
            ctx.closePath();
            ctx.fill();

            const glow = ctx.createRadialGradient(cx, cy, 0, cx, cy, size * 2);
            glow.addColorStop(0, `rgba(200,184,232,${alpha * 0.5})`);
            glow.addColorStop(1, 'rgba(200,184,232,0)');
            ctx.fillStyle = glow;
            ctx.fillRect(cx - size * 2, cy - size * 2, size * 4, size * 4);
            ctx.restore();
          }

          function draw() {
            t += 0.003;
            const dpr = window.devicePixelRatio || 1;
            const w = window.innerWidth;
            const h = window.innerHeight;

            ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

            if (isDark) {
              const grad = ctx.createLinearGradient(0, 0, w, h);
              grad.addColorStop(0, '#0a1628');
              grad.addColorStop(0.3, '#0d1f3c');
              grad.addColorStop(0.55, '#1a1a40');
              grad.addColorStop(0.75, '#3d1f56');
              grad.addColorStop(1, '#6b2a6e');
            ctx.fillStyle = grad;
            } else {
              const grad = ctx.createLinearGradient(0, 0, w, h);
              grad.addColorStop(0, '#e8f0fe');
              grad.addColorStop(0.4, '#dce6f7');
              grad.addColorStop(0.7, '#e8ddf5');
              grad.addColorStop(1, '#f0e4f7');
              ctx.fillStyle = grad;
            }
            ctx.fillRect(0, 0, w, h);

            if (isDark) {
              const nebula = ctx.createRadialGradient(w * 0.7, h * 0.65, 0, w * 0.7, h * 0.65, Math.max(w, h) * 0.55);
              nebula.addColorStop(0, 'rgba(120,40,120,0.25)');
              nebula.addColorStop(0.4, 'rgba(80,25,90,0.15)');
              nebula.addColorStop(1, 'rgba(0,0,0,0)');
              ctx.fillStyle = nebula;
              ctx.fillRect(0, 0, w, h);

              const nebula2 = ctx.createRadialGradient(w * 0.2, h * 0.3, 0, w * 0.2, h * 0.3, Math.max(w, h) * 0.5);
              nebula2.addColorStop(0, 'rgba(10,50,100,0.2)');
              nebula2.addColorStop(0.5, 'rgba(5,30,60,0.1)');
              nebula2.addColorStop(1, 'rgba(0,0,0,0)');
              ctx.fillStyle = nebula2;
              ctx.fillRect(0, 0, w, h);
            }

            const starAlphaBase = isDark ? 1 : 0.25;
            stars.forEach(s => {
              const twinkle = 0.4 + 0.6 * Math.sin(t * s.speed + s.phase);
              const alpha = s.brightness * twinkle * starAlphaBase;
              const sx = s.x * w;
              const sy = s.y * h;
              ctx.beginPath();
              ctx.arc(sx, sy, s.r, 0, Math.PI * 2);
              ctx.fillStyle = isDark
                ? `rgba(200,200,220,${alpha})`
                : `rgba(100,80,160,${alpha})`;
              ctx.fill();
            });

            if (isDark) {
              sparkles.forEach(sp => {
                const pulse = 0.3 + 0.7 * ((Math.sin(t * sp.speed + sp.phase) + 1) / 2);
                drawStar4(sp.x * w, sp.y * h, sp.size * pulse, pulse * 0.8);
              });
            }

            animId = requestAnimationFrame(draw);
          }

          draw();
          return () => {
            cancelAnimationFrame(animId);
            window.removeEventListener('resize', resize);
          };
        }, [isDark]);

        return (
          <canvas
            ref={canvasRef}
            style={{ position: 'fixed', top: 0, left: 0, width: '100%', height: '100%', zIndex: 1, pointerEvents: 'none' }}
          />
        );
      }

      /* ---------- Side Bar Nav ---------- */
      function DotNav({ count, activeIndex, onJump, isDark }) {
        function getPhase(idx) {
          if (idx <= 1) return 'intro';
          if (idx >= 2 && idx <= 7) return 'discover';
          if (idx >= 8 && idx <= 12) return 'protect';
          if (idx >= 13 && idx <= 15) return 'monitor';
          return 'intro';
        }

        function getColor(idx) {
          const phase = getPhase(idx);
          if (phase === 'discover') return isDark ? '#00BCEB' : '#0077C8';
          if (phase === 'protect') return isDark ? '#F59E0B' : '#D97706';
          if (phase === 'monitor') return isDark ? '#22C55E' : '#16A34A';
          return isDark ? '#00BCEB' : '#0070D2';
        }

        const dimBg = isDark ? 'rgba(255,255,255,0.15)' : 'rgba(0,0,0,0.12)';

        return (
          <div
            className="fixed z-50 flex flex-col items-center gap-[5px]"
            style={{
              left: 16,
              top: '50%',
              transform: 'translateY(-50%)',
            }}
          >
            {Array.from({ length: count }).map((_, idx) => {
              const isActive = idx === activeIndex;
              const isPast = idx < activeIndex;
              const col = getColor(idx);

              return (
                <div
                  key={idx}
                  onClick={() => onJump(idx)}
                  style={{
                    width: 4,
                    height: isActive ? 28 : 14,
                    borderRadius: 2,
                    background: isActive ? col : isPast ? col : dimBg,
                    opacity: isActive ? 1 : isPast ? 0.55 : 0.35,
                    cursor: 'pointer',
                    transition: 'all 0.35s ease',
                    boxShadow: isActive ? `0 0 8px ${col}` : 'none',
                  }}
                  title={`Slide ${idx + 1}`}
                />
              );
            })}
          </div>
        );
      }

      /* ---------- Section ---------- */
      const Section = React.forwardRef(({ title, text, index, list, custom, image, video, isDark }, ref) => {
        const [visible, setVisible] = React.useState(false);
        const localRef = React.useRef();
        const setRefs = el => {
          localRef.current = el;
          if (ref) ref(el);
        };

        React.useEffect(() => {
          const observer = new window.IntersectionObserver(
            ([entry]) => setVisible(entry.isIntersecting),
            { threshold: 0.3 }
          );
          if (localRef.current) observer.observe(localRef.current);
          return () => observer.disconnect();
        }, []);

        const videoRef = React.useRef(null);
        React.useEffect(() => {
          const vid = videoRef.current;
          if (!vid) return;
          const timeout = setTimeout(() => {
            if (vid.paused) vid.play().catch(() => {});
          }, 200);
          return () => clearTimeout(timeout);
        }, [index, video]);

        const bg = 'transparent';

        /* ---- Intro ---- */
        if (custom === 'intro') {
          const notifications = [
            { icon: 'N', iconColor: '#3b82f6', source: 'Cyber News', message: "Dev teams juggling timelines and security requirements", time: 'Just now' },
            { icon: 'N', iconColor: '#3b82f6', source: 'Network Security News', message: "Ransomware is more ruthless than ever", time: 'Just now' },
            { icon: 'CSN', iconColor: '#ef4444', source: 'Cyber Security News', message: "Major business disruptions from cyberattacks continue worldwide", time: 'Just now' },
            { icon: 'F', iconColor: '#10b981', source: 'Forrester Consulting', message: "163% ROI with software firewalls across environments", time: 'Just now' },
            { icon: '💬', iconColor: '#8b5cf6', source: 'Slack · Anil', message: "Thoughts on how we meet app deadlines with new security requirements?", time: 'Just now' },
            { icon: 'N', iconColor: '#3b82f6', source: 'Cyber News', message: "Poll: Cloud Application Security Still Falls Short", time: 'Just now' },
            { icon: '💬', iconColor: '#8b5cf6', source: 'Slack · Ron', message: "The sweepstakes app needs to be secured. Do we have a plan?", time: 'Just now' },
            { icon: '📅', iconColor: '#10b981', source: 'Calendar', message: "Cross-cloud security visibility (attendance required)", time: 'Just now' },
            { icon: 'F', iconColor: '#10b981', source: 'Cyber Security News', message: "Costs can top $1B from cyberattacks across industries", time: 'Just now' },
            { icon: '💬', iconColor: '#8b5cf6', source: 'Slack · Prajakta', message: "Compliance team noticed a shadow IT app collecting customer data", time: 'Just now' },
          ];
          const notifBg      = isDark ? 'rgba(26,26,26,0.65)' : 'rgba(255,255,255,0.82)';
          const notifBorder  = isDark ? '1px solid rgba(255,255,255,0.08)' : '1px solid rgba(0,0,0,0.06)';
          const notifShadow  = isDark ? '0 16px 60px rgba(0,0,0,0.28)' : '0 4px 20px rgba(0,0,0,0.08)';
          const notifText    = isDark ? 'rgba(255,255,255,0.9)' : '#1a202c';
          const notifSub     = isDark ? 'rgba(180,180,180,0.7)' : 'rgba(0,0,0,0.45)';
          const headingColor = isDark ? '#F2F6FB' : 'var(--fz-color-neutral-5)';
          const eyebrowColor = isDark ? '#7DD3FC' : 'var(--fz-color-primary-5)';
          const bodyColor    = isDark ? 'rgba(226,232,240,0.82)' : 'var(--fz-color-neutral-4)';
          const leftCards = notifications.slice(0, 5);
          const rightCards = notifications.slice(5);
          const leftFeed = [...leftCards, ...leftCards];
          const rightFeed = [...rightCards, ...rightCards];

          return (
            <section
              ref={setRefs}
              dir="ltr"
              className="h-screen relative overflow-hidden"
              style={{ background: 'transparent' }}
            >
              <div className="hero-frame" style={{ zIndex: 1 }}>
                <video
                  className="hero-video"
                  src="banner/3249672-uhd_3840_2160_25fps.mp4"
                  autoPlay
                  muted
                  loop
                  playsInline
                  preload="auto"
                  style={{ filter: isDark ? 'blur(3px) saturate(0.72) brightness(0.4)' : 'blur(3px) saturate(0.6) brightness(1.1)' }}
                />
                <div className={isDark ? 'hero-overlay' : 'hero-overlay hero-overlay-light'} />
              </div>

              <div className="absolute inset-0 pointer-events-none" style={{ zIndex: 4 }}>
                <div className="hero-feed-column left">
                  <div className="hero-feed-track" style={{ '--dur': '22s' }}>
                    {leftFeed.map((notif, idx) => {
                      return (
                        <div
                          key={`left-${idx}`}
                          className="hero-feed-card"
                          style={{ backgroundColor: notifBg, border: notifBorder, boxShadow: notifShadow }}
                        >
                          <div className="flex items-center gap-2 mb-2">
                            <span className="text-sm font-bold" style={{ color: notif.iconColor }}>{notif.icon}</span>
                            <span className="text-xs font-semibold tracking-wide uppercase" style={{ color: notifSub }}>{notif.source}</span>
                            <span className="text-[11px] ml-auto" style={{ color: notifSub, opacity: 0.72 }}>{notif.time}</span>
                          </div>
                          <div className="text-[13px] leading-5" style={{ color: notifText }}>{notif.message}</div>
                        </div>
                      );
                    })}
                  </div>
                </div>
                <div className="hero-feed-column right">
                  <div className="hero-feed-track" style={{ '--dur': '24s' }}>
                    {rightFeed.map((notif, idx) => {
                      return (
                        <div
                          key={`right-${idx}`}
                          className="hero-feed-card"
                          style={{ backgroundColor: notifBg, border: notifBorder, boxShadow: notifShadow }}
                        >
                          <div className="flex items-center gap-2 mb-2">
                            <span className="text-sm font-bold" style={{ color: notif.iconColor }}>{notif.icon}</span>
                            <span className="text-xs font-semibold tracking-wide uppercase" style={{ color: notifSub }}>{notif.source}</span>
                            <span className="text-[11px] ml-auto" style={{ color: notifSub, opacity: 0.72 }}>{notif.time}</span>
                          </div>
                          <div className="text-[13px] leading-5" style={{ color: notifText }}>{notif.message}</div>
                        </div>
                      );
                    })}
                  </div>
                </div>
              </div>

              <div className="absolute inset-0 flex flex-col items-center justify-center px-6" style={{ zIndex: 10 }}>
                <img src="banner/Cisco-logo.png" alt="Cisco Logo" className="h-12 md:h-14 w-auto mb-10 opacity-95" />
                <div className="text-center max-w-3xl">
                  <div
                    className="text-sm md:text-base mb-4 tracking-[0.34em] uppercase"
                    style={{ color: eyebrowColor, fontWeight: 'var(--fz-weight-semi-bold)' }}
                  >
                    Cisco Hybrid Mesh Firewall
                  </div>
                  <h1
                    className="text-4xl md:text-6xl lg:text-7xl leading-[0.95] mb-6"
                    style={{ color: headingColor, fontWeight: 'var(--fz-weight-light)' }}
                  >
                    A Day in the Life
                    <br />
                    of a Hybrid Security Leader
                  </h1>

                  <div className="flex items-center justify-center gap-3 mt-2 mb-6" style={{ animation: 'bounce 2s infinite' }}>
                    <svg width="28" height="42" viewBox="0 0 28 42" fill="none" style={{ opacity: 0.7 }}>
                      <rect x="1" y="1" width="26" height="40" rx="13" stroke={isDark ? 'rgba(255,255,255,0.5)' : 'rgba(0,0,0,0.35)'} strokeWidth="2" />
                      <circle cx="14" cy="12" r="3" fill={isDark ? 'rgba(255,255,255,0.6)' : 'rgba(0,0,0,0.4)'}>
                        <animate attributeName="cy" values="12;22;12" dur="1.8s" repeatCount="indefinite" />
                        <animate attributeName="opacity" values="1;0.3;1" dur="1.8s" repeatCount="indefinite" />
                      </circle>
                    </svg>
                    <span
                      className="text-[13px] tracking-[0.2em] uppercase"
                      style={{ color: isDark ? 'rgba(255,255,255,0.5)' : 'rgba(0,0,0,0.4)', fontWeight: 500 }}
                    >
                      Scroll to begin
                    </span>
                  </div>
                </div>
              </div>

              <div
                className="absolute bottom-0 left-1/2 transform -translate-x-1/2"
                style={{ zIndex: 8, width: 'min(62vw, 740px)' }}
              >
                <img
                  src="images/l-1.webp"
                  alt=""
                  className="w-full"
                  style={{
                    display: 'block',
                    filter: isDark ? 'brightness(0.85) drop-shadow(0 -20px 60px rgba(0,0,0,0.5))' : 'brightness(1) drop-shadow(0 -16px 50px rgba(0,0,0,0.2))',
                  }}
                />
              </div>
            </section>
          );
        }

        /* ---- Outro ---- */
        if (custom) {
          const headingColor = isDark ? 'var(--fz-color-primary-3)' : 'var(--fz-color-primary-7)';
          const cardBg       = isDark ? 'rgba(26,26,26,0.6)' : 'rgba(255,255,255,0.7)';
          const cardText     = isDark ? 'var(--fz-color-neutral-0)' : 'var(--fz-color-neutral-5)';
          const listText     = isDark ? 'var(--fz-color-neutral-2)' : 'var(--fz-color-neutral-4)';
          const btnColor     = isDark ? 'var(--fz-color-primary-4)' : 'var(--fz-color-primary-5)';

          return (
            <section
              ref={setRefs}
              dir="ltr"
              className={`section-bg-cisco h-screen grid grid-cols-1 md:grid-cols-2 items-center justify-center px-6 md:px-24 gap-16 transition-all duration-700 ${visible ? 'opacity-100 translate-y-0' : 'opacity-0 translate-y-12'}`}
              style={{ position: 'relative', overflow: 'hidden', background: 'transparent' }}
            >
              <div className="flex flex-col justify-center items-start md:items-end section-content-cisco z-10">
                <div className="text-[40px] md:text-[64px] leading-tight mb-16 text-left md:text-right" style={{color: headingColor, fontWeight: 'var(--fz-weight-light)'}}>
                  Any workload.<br/>Any connection.<br/>Any cloud.
                </div>
              </div>
              <div className="flex flex-col justify-center items-start p-8 rounded-xl max-w-xl section-content-cisco z-10"
                style={{ background: cardBg, border: isDark ? 'none' : '1px solid rgba(0,0,0,0.08)', backdropFilter: 'blur(8px)' }}>
                <div className="text-xl mb-4" style={{color: cardText, fontWeight: 'var(--fz-weight-medium)'}}>Secured with Cisco Hybrid Mesh Firewall</div>
                <ul className="mb-4 space-y-2 list-disc pl-6 text-lg" style={{color: listText}}>
                  <li>Faster policy deployment with unified management</li>
                  <li>Reduction in operational overhead</li>
                  <li>End-to-end visibility into encrypted traffic, user identity, and application behavior</li>
                </ul>
                <button
                  className="cisco-btn-primary text-lg px-8 py-3"
                  style={{border:`2px solid ${btnColor}`, background:'transparent', color: btnColor}}
                >
                  GET STARTED
                </button>
              </div>
            </section>
          );
        }

        /* ---- Regular section ---- */
        const getPhaseLabel = (t) => {
          if (t.startsWith('PHASE 1: DISCOVER')) return { label: 'PHASE 1: DISCOVER', type: 'discover', rest: t.replace('PHASE 1: DISCOVER - ', '') };
          if (t.startsWith('PHASE 2: PROTECT'))  return { label: 'PHASE 2: PROTECT',  type: 'protect',  rest: t.replace('PHASE 2: PROTECT - ', '') };
          if (t.startsWith('PHASE 3: MONITOR'))  return { label: 'PHASE 3: MONITOR',  type: 'monitor',  rest: t.replace('PHASE 3: MONITOR - ', '') };
          return null;
        };
        const phaseInfo = getPhaseLabel(title);

        const titleColor = isDark ? 'var(--fz-color-neutral-0)' : 'var(--fz-color-primary-7)';
        const textColor  = isDark ? 'var(--fz-color-neutral-3)' : 'var(--fz-color-neutral-4)';
        const divider    = isDark ? 'rgba(255,255,255,0.06)' : 'rgba(0,0,0,0.07)';

        return (
          <section
            ref={setRefs}
            dir="ltr"
            className={`section-bg-cisco h-screen grid items-start px-8 md:px-16 transition-all duration-700 ${visible ? 'opacity-100 translate-y-0' : 'opacity-0 translate-y-12'}`}
            style={{ gridTemplateColumns: '1fr 2fr', gap: 0, background: 'transparent', paddingTop: '12vh' }}
          >
            <div
              className="section-content-cisco flex flex-col justify-start pl-4 pr-10"
              style={{ borderRight: `1px solid ${divider}` }}
            >
              {phaseInfo && (
                <span className={`phase-label ${phaseInfo.type}`}>
                  {phaseInfo.label}
                </span>
              )}
              <h2
                className="text-3xl md:text-4xl lg:text-5xl mb-6 leading-tight"
                style={{ color: titleColor, fontWeight: 'var(--fz-weight-light)' }}
              >
                {phaseInfo ? phaseInfo.rest : title}
              </h2>
              {list ? (
                <ul className="list-disc text-xl md:text-2xl max-w-xl" style={{color: textColor}}>
                  {list.map((item, i) => <li key={i}>{item}</li>)}
                </ul>
              ) : (
                <pre
                  className="text-lg md:text-xl whitespace-pre-line leading-relaxed"
                  style={{background:'none', fontFamily:'inherit', color: textColor, fontWeight: 'var(--fz-weight-regular)'}}
                >
                  {text}
                </pre>
              )}
            </div>
            <div className="section-content-cisco flex justify-center items-start py-0 pl-10">
              <div className="rounded-xl max-h-[72vh] w-full overflow-hidden flex justify-center items-center">
                {image ? (
                  <img
                    src={image}
                    alt={title}
                    className="object-contain w-full max-h-[72vh]"
                    style={{ borderRadius: '0.75rem' }}
                  />
                ) : video ? (
                  <video
                    ref={videoRef}
                    src={video}
                    autoPlay muted playsInline preload="auto"
                    className="object-cover w-full max-h-[72vh]"
                    style={{ borderRadius: '0.75rem' }}
                  />
                ) : null}
              </div>
            </div>
          </section>
        );
      });

      /* ---------- Sticky Logo ---------- */
      function StickyLogo({ isDark }) {
        return (
          <header
            className="sticky top-0 z-50 flex justify-center items-center py-4 shadow-sm"
            style={{
              background: isDark ? 'rgba(10,22,40,0.92)' : 'rgba(244,245,248,0.9)',
              backdropFilter: 'blur(12px)',
              borderBottom: isDark ? '1px solid rgba(255,255,255,0.05)' : '1px solid rgba(0,0,0,0.07)',
              transition: 'all 0.4s ease',
            }}
          >
            <img src="banner/Cisco-logo.png" alt="Cisco Logo" className="h-10 w-auto mx-auto" />
          </header>
        );
      }

      /* ---------- App ---------- */
      function App() {
        const [activeIndex, setActiveIndex] = React.useState(0);
        const [isDark, setIsDark] = React.useState(true);
        const isScrolling = React.useRef(false);

        React.useEffect(() => {
          document.body.style.background = isDark ? '#0a1628' : 'var(--fz-color-neutral-1)';
          document.body.style.color = isDark ? '#f5f5f5' : 'var(--fz-color-neutral-5)';
        }, [isDark]);

        const wheelAccum = React.useRef(0);
        const WHEEL_THRESHOLD = 80;
        const COOLDOWN = 1000;

        React.useEffect(() => {
          const handleWheel = (e) => {
            e.preventDefault();
            if (isScrolling.current) return;
            wheelAccum.current += e.deltaY;
            if (Math.abs(wheelAccum.current) < WHEEL_THRESHOLD) return;
            const direction = wheelAccum.current > 0 ? 1 : -1;
            wheelAccum.current = 0;
            isScrolling.current = true;
            setTimeout(() => { isScrolling.current = false; }, COOLDOWN);
            if (direction > 0 && activeIndex < sections.length - 1) {
              setActiveIndex(idx => Math.min(idx + 1, sections.length - 1));
            } else if (direction < 0 && activeIndex > 0) {
              setActiveIndex(idx => Math.max(idx - 1, 0));
            }
          };
          window.addEventListener('wheel', handleWheel, { passive: false });
          return () => { window.removeEventListener('wheel', handleWheel); wheelAccum.current = 0; };
        }, [activeIndex]);

        const handleJump = idx => setActiveIndex(idx);

        return (
          <div className="min-h-screen font-sans relative overflow-hidden" style={{ transition: 'background 0.4s ease' }}>
            <MeshBackground isDark={isDark} />
            <div style={{ position: 'relative', zIndex: 2 }}>
            <ThemeToggle isDark={isDark} onToggle={() => setIsDark(d => !d)} />
            {activeIndex !== 0 && <StickyLogo isDark={isDark} />}
            {activeIndex !== 0 && (
              <DotNav
                count={sections.length}
                activeIndex={activeIndex}
                onJump={handleJump}
                isDark={isDark}
              />
            )}
            <main>
              <Section
                key={activeIndex}
                title={sections[activeIndex].title}
                text={sections[activeIndex].text}
                index={activeIndex}
                list={sections[activeIndex].list}
                custom={sections[activeIndex].custom}
                image={sections[activeIndex].image}
                video={sections[activeIndex].video}
                isDark={isDark}
              />
            </main>
            </div>
          </div>
        );
      }

      const root = ReactDOM.createRoot(document.getElementById('root'));
      root.render(<App />);
    </script>
  </body>
</html>
